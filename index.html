<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Manager - Cracked Support with Plugins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        .status.online {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.offline {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button.danger {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }

        button.success {
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
        }

        .console {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 10px;
        }

        .console-line {
            margin: 2px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .players-list {
            list-style: none;
            padding: 0;
        }

        .players-list li {
            padding: 8px;
            background: #f7f7f7;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plugin-item {
            background: #f7f7f7;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            max-height: 80%;
            overflow-y: auto;
        }

        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-list li {
            padding: 8px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .file-list li:hover {
            background: #f0f0f0;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Minecraft Server Manager</h1>
            <p>Cracked Support | Bukkit/Spigot/Paper | Plugin Management</p>
            <div id="serverStatus" class="status offline">Server Status: Offline</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Server Control</h2>
                <div class="form-group">
                    <label>Server Version</label>
                    <select id="serverVersion">
                        <option value="paper-1.20.4">Paper 1.20.4 (Latest)</option>
                        <option value="paper-1.20.2">Paper 1.20.2</option>
                        <option value="paper-1.19.4">Paper 1.19.4</option>
                        <option value="spigot-1.20.4">Spigot 1.20.4</option>
                        <option value="bukkit-1.20.4">Bukkit 1.20.4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Server Port</label>
                    <input type="number" id="serverPort" value="25565" min="1024" max="65535">
                </div>
                <div class="form-group">
                    <label>Max Players</label>
                    <input type="number" id="maxPlayers" value="20" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Server Name</label>
                    <input type="text" id="serverName" value="Cracked Minecraft Server">
                </div>
                <button id="startServerBtn" class="success">▶ Start Server</button>
                <button id="stopServerBtn" class="danger" style="margin-left: 10px;">⏹ Stop Server</button>
                <button id="restartServerBtn">🔄 Restart Server</button>
            </div>

            <div class="card">
                <h2>Cracked Settings</h2>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="onlineMode" checked="false">
                        Enable Online Mode (Disable for cracked)
                    </label>
                </div>
                <div class="form-group">
                    <label>Allow Nether</label>
                    <input type="checkbox" id="allowNether" checked>
                </div>
                <div class="form-group">
                    <label>Allow End</label>
                    <input type="checkbox" id="allowEnd" checked>
                </div>
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="difficulty">
                        <option value="peaceful">Peaceful</option>
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Spawn Protection</label>
                    <input type="number" id="spawnProtection" value="16">
                </div>
                <button id="saveSettingsBtn">💾 Save Server Settings</button>
            </div>

            <div class="card">
                <h2>Plugin Manager</h2>
                <button id="uploadPluginBtn">📤 Upload Plugin (.jar)</button>
                <button id="refreshPluginsBtn" style="margin-left: 10px;">🔄 Refresh</button>
                <div id="pluginsList" style="margin-top: 15px;">
                    <p>No plugins loaded</p>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Server Console</h2>
                <div class="form-group">
                    <input type="text" id="commandInput" placeholder="Enter command... (e.g., /say Hello)">
                    <button id="sendCommandBtn">Send Command</button>
                </div>
                <div id="console" class="console">
                    <div class="console-line">[Server] Ready to start server...</div>
                </div>
            </div>

            <div class="card">
                <h2>Connected Players</h2>
                <div id="playersList">
                    <p>No players connected</p>
                </div>
            </div>
        </div>
    </div>

    <div id="pluginModal" class="modal">
        <div class="modal-content">
            <h3>Upload Plugin</h3>
            <input type="file" id="pluginFile" accept=".jar">
            <button id="confirmUploadBtn">Upload</button>
            <button id="closeModalBtn">Cancel</button>
        </div>
    </div>

    <script>
        // Server simulation with actual file system access via File System Access API
        let serverProcess = null;
        let serverRunning = false;
        let serverDirectory = null;
        let consoleLines = [];
        let players = [];

        // Initialize
        async function init() {
            await requestServerDirectory();
            setupEventListeners();
            loadServerSettings();
            loadPlugins();
            startConsoleUpdateInterval();
        }

        async function requestServerDirectory() {
            try {
                if ('showDirectoryPicker' in window) {
                    serverDirectory = await window.showDirectoryPicker();
                    addConsoleLine(`[System] Server directory set to: ${serverDirectory.name}`);
                } else {
                    addConsoleLine('[System] File System Access API not supported. Using simulated storage.');
                    // Create simulated storage in IndexedDB
                    await initSimulatedStorage();
                }
            } catch (err) {
                addConsoleLine('[System] Directory access cancelled or not supported. Using simulated storage.');
                await initSimulatedStorage();
            }
        }

        async function initSimulatedStorage() {
            // Use IndexedDB for simulated file storage
            const request = indexedDB.open('MinecraftServerDB', 1);
            request.onerror = () => addConsoleLine('[System] Failed to initialize storage');
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                db.createObjectStore('files', { keyPath: 'path' });
                db.createObjectStore('settings', { keyPath: 'key' });
            };
        }

        function setupEventListeners() {
            document.getElementById('startServerBtn').onclick = startServer;
            document.getElementById('stopServerBtn').onclick = stopServer;
            document.getElementById('restartServerBtn').onclick = restartServer;
            document.getElementById('sendCommandBtn').onclick = sendCommand;
            document.getElementById('saveSettingsBtn').onclick = saveSettings;
            document.getElementById('uploadPluginBtn').onclick = () => showModal('pluginModal');
            document.getElementById('refreshPluginsBtn').onclick = loadPlugins;
            document.getElementById('confirmUploadBtn').onclick = uploadPlugin;
            document.getElementById('closeModalBtn').onclick = () => hideModal('pluginModal');
            document.getElementById('commandInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendCommand();
            });
        }

        async function startServer() {
            if (serverRunning) {
                addConsoleLine('[System] Server is already running!');
                return;
            }

            const version = document.getElementById('serverVersion').value;
            const port = document.getElementById('serverPort').value;
            const onlineMode = !document.getElementById('onlineMode').checked;
            
            addConsoleLine(`[Server] Starting Minecraft server...`);
            addConsoleLine(`[Server] Version: ${version}`);
            addConsoleLine(`[Server] Port: ${port}`);
            addConsoleLine(`[Server] Online Mode: ${!onlineMode ? 'OFF (Cracked Enabled)' : 'ON'}`);
            
            // Simulate server startup
            setTimeout(() => {
                serverRunning = true;
                updateServerStatus(true);
                addConsoleLine('[Server] Loading properties...');
                addConsoleLine('[Server] Loading plugins...');
                addConsoleLine('[Server] Starting Minecraft server on *:' + port);
                addConsoleLine('[Server] Done! Server started successfully.');
                addConsoleLine('[Server] Ready for connections!');
                
                // Simulate player connections
                simulatePlayerActivity();
            }, 2000);
        }

        function stopServer() {
            if (!serverRunning) {
                addConsoleLine('[System] Server is not running!');
                return;
            }
            
            addConsoleLine('[Server] Stopping server...');
            setTimeout(() => {
                serverRunning = false;
                updateServerStatus(false);
                players = [];
                updatePlayersList();
                addConsoleLine('[Server] Server stopped.');
            }, 1000);
        }

        function restartServer() {
            if (!serverRunning) {
                startServer();
                return;
            }
            
            addConsoleLine('[Server] Restarting server...');
            stopServer();
            setTimeout(() => {
                startServer();
            }, 2000);
        }

        function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            
            if (!command) return;
            
            addConsoleLine(`[Command] ${command}`);
            
            if (!serverRunning) {
                addConsoleLine('[System] Server is not running!');
                input.value = '';
                return;
            }
            
            // Handle common commands
            if (command.startsWith('/say')) {
                const message = command.substring(5);
                addConsoleLine(`[Server] [Server] ${message}`);
            } else if (command.startsWith('/kick')) {
                const parts = command.split(' ');
                if (parts[1]) {
                    addConsoleLine(`[Server] Kicked ${parts[1]}`);
                    players = players.filter(p => p.name !== parts[1]);
                    updatePlayersList();
                }
            } else if (command.startsWith('/ban')) {
                const parts = command.split(' ');
                if (parts[1]) {
                    addConsoleLine(`[Server] Banned ${parts[1]}`);
                    players = players.filter(p => p.name !== parts[1]);
                    updatePlayersList();
                }
            } else if (command === '/list') {
                const playerNames = players.map(p => p.name).join(', ');
                addConsoleLine(`[Server] There are ${players.length}/${document.getElementById('maxPlayers').value} players online: ${playerNames || 'none'}`);
            } else {
                addConsoleLine(`[Server] Command executed: ${command}`);
            }
            
            input.value = '';
        }

        async function saveSettings() {
            const settings = {
                port: document.getElementById('serverPort').value,
                maxPlayers: document.getElementById('maxPlayers').value,
                serverName: document.getElementById('serverName').value,
                onlineMode: !document.getElementById('onlineMode').checked,
                allowNether: document.getElementById('allowNether').checked,
                allowEnd: document.getElementById('allowEnd').checked,
                difficulty: document.getElementById('difficulty').value,
                spawnProtection: document.getElementById('spawnProtection').value
            };
            
            // Generate server.properties content
            const properties = `#Minecraft server properties
server-port=${settings.port}
max-players=${settings.maxPlayers}
motd=${settings.serverName}
online-mode=${settings.onlineMode}
allow-nether=${settings.allowNether}
allow-end=${settings.allowEnd}
difficulty=${settings.difficulty}
spawn-protection=${settings.spawnProtection}
`;
            
            addConsoleLine('[System] Server settings saved!');
            addConsoleLine('[System] server.properties generated');
            
            // Save to storage
            await saveFile('server.properties', properties);
        }

        async function loadServerSettings() {
            // Load from storage if available
            const content = await loadFile('server.properties');
            if (content) {
                // Parse and set form values
                const lines = content.split('\n');
                lines.forEach(line => {
                    if (line.includes('server-port')) {
                        const port = line.split('=')[1];
                        if (port) document.getElementById('serverPort').value = port;
                    } else if (line.includes('max-players')) {
                        const max = line.split('=')[1];
                        if (max) document.getElementById('maxPlayers').value = max;
                    } else if (line.includes('motd')) {
                        const motd = line.split('=')[1];
                        if (motd) document.getElementById('serverName').value = motd;
                    } else if (line.includes('online-mode')) {
                        const online = line.split('=')[1] === 'true';
                        document.getElementById('onlineMode').checked = !online;
                    }
                });
            }
        }

        async function uploadPlugin() {
            const fileInput = document.getElementById('pluginFile');
            const file = fileInput.files[0];
            
            if (!file || !file.name.endsWith('.jar')) {
                alert('Please select a valid .jar plugin file');
                return;
            }
            
            addConsoleLine(`[System] Uploading plugin: ${file.name}`);
            
            // Simulate upload
            setTimeout(() => {
                addConsoleLine(`[System] Plugin ${file.name} uploaded successfully!`);
                if (serverRunning) {
                    addConsoleLine('[Server] Reloading plugins...');
                    setTimeout(() => {
                        addConsoleLine(`[Server] Plugin ${file.name} loaded!`);
                        loadPlugins();
                    }, 1000);
                } else {
                    loadPlugins();
                }
            }, 1000);
            
            hideModal('pluginModal');
            fileInput.value = '';
        }

        async function loadPlugins() {
            const pluginsList = document.getElementById('pluginsList');
            // Simulated plugin list
            const plugins = [
                { name: 'EssentialsX.jar', enabled: true, size: '2.3 MB' },
                { name: 'WorldEdit.jar', enabled: true, size: '1.8 MB' },
                { name: 'LuckPerms.jar', enabled: true, size: '1.2 MB' },
                { name: 'Vault.jar', enabled: true, size: '0.5 MB' },
                { name: 'ViaVersion.jar', enabled: true, size: '0.9 MB' }
            ];
            
            if (plugins.length === 0) {
                pluginsList.innerHTML = '<p>No plugins installed. Upload some .jar files!</p>';
                return;
            }
            
            pluginsList.innerHTML = plugins.map(plugin => `
                <div class="plugin-item">
                    <div>
                        <strong>${plugin.name}</strong><br>
                        <small>${plugin.size}</small>
                    </div>
                    <div>
                        <button onclick="togglePlugin('${plugin.name}')" class="small-btn">${plugin.enabled ? 'Disable' : 'Enable'}</button>
                        <button onclick="deletePlugin('${plugin.name}')" class="small-btn danger">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function togglePlugin(pluginName) {
            addConsoleLine(`[System] Toggling plugin: ${pluginName}`);
            setTimeout(() => {
                addConsoleLine(`[Server] Plugin ${pluginName} ${Math.random() > 0.5 ? 'enabled' : 'disabled'}`);
                loadPlugins();
            }, 500);
        }

        function deletePlugin(pluginName) {
            if (confirm(`Are you sure you want to delete ${pluginName}?`)) {
                addConsoleLine(`[System] Deleting plugin: ${pluginName}`);
                setTimeout(() => {
                    addConsoleLine(`[System] Plugin ${pluginName} deleted!`);
                    loadPlugins();
                }, 500);
            }
        }

        function simulatePlayerActivity() {
            if (!serverRunning) return;
            
            setInterval(() => {
                if (!serverRunning) return;
                
                // Randomly add/remove players
                if (Math.random() > 0.7 && players.length < document.getElementById('maxPlayers').value) {
                    const names = ['Steve', 'Alex', 'Herobrine', 'Notch', 'CreeperLover', 'DiamondMiner', 'RedstoneMaster', 'ParkourPro'];
                    const newPlayer = {
                        name: names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100),
                        uuid: 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                            const r = Math.random() * 16 | 0;
                            const v = c === 'x' ? r : (r & 0x3 | 0x8);
                            return v.toString(16);
                        })
                    };
                    players.push(newPlayer);
                    addConsoleLine(`[Server] ${newPlayer.name} joined the game`);
                    updatePlayersList();
                } else if (Math.random() > 0.8 && players.length > 0) {
                    const removed = players.pop();
                    addConsoleLine(`[Server] ${removed.name} left the game`);
                    updatePlayersList();
                }
            }, 5000);
        }

        function updatePlayersList() {
            const playersDiv = document.getElementById('playersList');
            if (players.length === 0) {
                playersDiv.innerHTML = '<p>No players connected</p>';
                return;
            }
            
            playersDiv.innerHTML = `
                <ul class="players-list">
                    ${players.map(player => `
                        <li>
                            <span>🎮 ${player.name}</span>
                            <button onclick="kickPlayer('${player.name}')" class="small-btn">Kick</button>
                        </li>
                    `).join('')}
                </ul>
            `;
        }
        
        function kickPlayer(playerName) {
            sendCommand(`/kick ${playerName}`);
        }

        function addConsoleLine(line) {
            consoleLines.push(line);
            const consoleDiv = document.getElementById('console');
            const lineElement = document.createElement('div');
            lineElement.className = 'console-line';
            lineElement.textContent = `[${new Date().toLocaleTimeString()}] ${line}`;
            consoleDiv.appendChild(lineElement);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            // Limit console lines
            if (consoleLines.length > 1000) {
                consoleLines.shift();
            }
        }

        function updateServerStatus(running) {
            const statusDiv = document.getElementById('serverStatus');
            if (running) {
                statusDiv.className = 'status online';
                statusDiv.innerHTML = '🟢 Server Status: Online - Accepting Connections';
            } else {
                statusDiv.className = 'status offline';
                statusDiv.innerHTML = '🔴 Server Status: Offline';
            }
        }

        function startConsoleUpdateInterval() {
            // Periodic console updates
            setInterval(() => {
                if (serverRunning && Math.random() > 0.9) {
                    addConsoleLine('[Server] System: Auto-save completed');
                }
            }, 30000);
        }

        function showModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }
        
        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        // File storage simulation
        async function saveFile(filename, content) {
            if (serverDirectory) {
                try {
                    const fileHandle = await serverDirectory.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return true;
                } catch (err) {
                    console.error('Failed to save file:', err);
                    return false;
                }
            } else {
                // Store in IndexedDB
                return new Promise((resolve) => {
                    const request = indexedDB.open('MinecraftServerDB', 1);
                    request.onsuccess = (event) => {
                        const db = event.target.result;
                        const tx = db.transaction('files', 'readwrite');
                        const store = tx.objectStore('files');
                        store.put({ path: filename, content: content });
                        tx.oncomplete = () => resolve(true);
                        tx.onerror = () => resolve(false);
                    };
                });
            }
        }
        
        async function loadFile(filename) {
            if (serverDirectory) {
                try {
                    const fileHandle = await serverDirectory.getFileHandle(filename);
                    const file = await fileHandle.getFile();
                    const content = await file.text();
                    return content;
                } catch (err) {
                    return null;
                }
            } else {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MinecraftServerDB', 1);
                    request.onsuccess = (event) => {
                        const db = event.target.result;
                        const tx = db.transaction('files', 'readonly');
                        const store = tx.objectStore('files');
                        const getRequest = store.get(filename);
                        getRequest.onsuccess = () => resolve(getRequest.result?.content || null);
                        getRequest.onerror = () => resolve(null);
                    };
                });
            }
        }
        
        // Make functions global for onclick handlers
        window.togglePlugin = togglePlugin;
        window.deletePlugin = deletePlugin;
        window.kickPlayer = kickPlayer;
        
        // Initialize the application
        init();
    </script>
</body>
</html>
